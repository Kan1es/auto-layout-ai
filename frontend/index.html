<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto Layout AI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <div class="eyebrow">Local MVP</div>
        <h1>Auto Layout AI</h1>
        <p class="lead">
          Локальный сценарий авторазметки: ZIP, статистика, DART, экспорт в CVAT.
        </p>

        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="healthStatus">Проверяем backend...</span>
        </div>

        <div class="steps" aria-label="MVP steps">
          <div>1. Загрузить ZIP</div>
          <div>2. Посчитать статистику</div>
          <div>3. Выбрать кадры</div>
          <div>4. Настроить DART</div>
          <div>5. Экспортировать в CVAT</div>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
